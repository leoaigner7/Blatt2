# DinD service is required for Testcontainers
services:
  - docker:20.10-dind

cache:
  key: maven
  paths:
    - .m2/repository

stages:
 - deploy

variables:
  # Tell maven to use the cache
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

container:
  image: maven:3.6-openjdk-15
  stage: deploy
  script: mvn -Dimage=${CI_REGISTRY}/${CI_PROJECT_PATH}/p2p spring-boot:build-image -DskipTests
  when: manual